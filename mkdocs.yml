site_name: corpusgen
site_description: Language-agnostic framework for generating and evaluating speech corpora with maximal phoneme coverage
site_url: https://jemsbhai.github.io/corpusgen/
repo_url: https://github.com/jemsbhai/corpusgen
repo_name: jemsbhai/corpusgen

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - toc.follow

nav:
  - Home: index.md
  - Examples: examples.md
  - API Reference: api.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            heading_level: 3
            docstring_style: google
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            members_order: source

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - toc:
      permalink: true
